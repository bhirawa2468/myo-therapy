  {id:1,title:"Lesson 1: Wake Up, Little Nose!",num:"Lesson 1 · 0:44",vtt:`WEBVTT

0

00:00:33.040 --> 00:00:39.799

akan mencapainya melalui aktivitas yang menyenangkan.

9

let currentIndex = 0;
let hls = null;

function vttToBlob(vttText) {
  const blob = new Blob([vttText], {type:'text/vtt'});
  return URL.createObjectURL(blob);
}

function parseCues(vttText) {
  const lines = vttText.split('\n');
  const cues = [];
  let i = 0;
  while (i < lines.length) {
    if (lines[i] && lines[i].includes('-->')) {
      const ts = lines[i].trim();
      const textLines = [];
      i++;
      while (i < lines.length && lines[i].trim() !== '' && !lines[i].includes('-->')) {
        textLines.push(lines[i].trim());
        i++;
      }
      if (textLines.length) cues.push({ts, text: textLines.join(' ')});
    } else { i++; }
  }
  return cues;
}

function buildSidebar() {
  const list = document.getElementById('lesson-list');
  LESSONS.forEach((l, idx) => {
    const div = document.createElement('div');
    div.className = 'lesson-item' + (idx === 0 ? ' active' : '');
    div.innerHTML = `<span class="num">${l.num}</span><span class="title">${l.title}</span>`;
    div.onclick = () => loadLesson(idx);
    list.appendChild(div);
  });
}

function loadLesson(idx) {
  currentIndex = idx;
  const l = LESSONS[idx];
  const m3u8 = M3U8_URLS[idx] || '';

  document.querySelectorAll('.lesson-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });

  document.getElementById('lesson-title').textContent = l.title;
  document.getElementById('lesson-num').textContent = l.num;

  const video = document.getElementById('video');
  const noM3u8 = document.getElementById('no-m3u8');

  // Clear existing tracks
  while (video.firstChild) video.removeChild(video.firstChild);
  if (hls) { hls.destroy(); hls = null; }

  // Add Indonesian subtitle track
  const blobUrl = vttToBlob(l.vtt);
  const track = document.createElement('track');
  track.kind = 'subtitles';
  track.label = 'Bahasa Indonesia';
  track.srclang = 'id';
  track.src = blobUrl;
  track.default = true;
  video.appendChild(track);

  if (m3u8) {
    noM3u8.style.display = 'none';
    if (Hls.isSupported()) {
      hls = new Hls();
      hls.loadSource(m3u8);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play();
        // Enable subtitle
        for (let t of video.textTracks) { t.mode = 'showing'; }
      });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = m3u8;
      video.addEventListener('loadedmetadata', () => video.play());
    }
  } else {
    noM3u8.style.display = 'block';
    video.removeAttribute('src');
  }

  // Render transcript
  const cuesEl = document.getElementById('cues');
  cuesEl.innerHTML = '';
  const cues = parseCues(l.vtt);
  cues.forEach(c => {
    const div = document.createElement('div');
    div.className = 'cue';
    div.innerHTML = `<div class="ts">${c.ts}</div>${c.text}`;
    cuesEl.appendChild(div);
  });
}

buildSidebar();
loadLesson(0);
</script>
